# SonarCloud config for backend
sonar.projectKey=your-org_car-backend
sonar.organization=your-org
sonar.projectName=car-backend
sonar.projectVersion=1.0

sonar.sources=.
sonar.exclusions=node_modules/**,coverage/**,**/*.test.js

# Coverage report path
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality Gate thresholds (set in SonarCloud dashboard)
# Coverage minimum: 70%
# Duplications maximum: 3%
# Reliability rating: A
