# SonarCloud config for frontend
sonar.projectKey=your-org_car-frontend
sonar.organization=your-org
sonar.projectName=car-frontend
sonar.projectVersion=1.0

sonar.sources=src
sonar.exclusions=node_modules/**,build/**,coverage/**,**/*.test.js,**/*.test.jsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=coverage/test-report.xml
